<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curbloom Post Designer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,700;0,800;1,400&family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0b0f14;
  --bg1: #0f1419;
  --bg2: #141b24;
  --bg3: #1a2535;
  --border: #1e2d3d;
  --green: #2d6a4f;
  --green-b: #52b788;
  --green-l: #74c69d;
  --green-p: #b7e4c7;
  --orange: #ff914d;
  --text: #e8eef4;
  --muted: #8a9bb0;
  --dim: #4a5568;
}

body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── HEADER ── */
.header {
  background: var(--bg1);
  border-bottom: 2px solid var(--green);
  padding: 0.9rem 1.5rem;
  display: flex; align-items: center; justify-content: space-between;
}
.logo { font-family: 'DM Mono', monospace; font-size: 0.75rem; font-weight: 500; color: var(--green-b); letter-spacing: 3px; }
.logo span { color: var(--muted); }
.back-link { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); text-decoration: none; letter-spacing: 1px; padding: 4px 10px; border: 1px solid var(--border); border-radius: 5px; transition: all 0.15s; }
.back-link:hover { color: var(--green-b); border-color: var(--green); }

/* ── APP LAYOUT ── */
.app { display: grid; grid-template-columns: 300px 1fr; min-height: calc(100vh - 52px); }

/* ── SIDEBAR ── */
.sidebar {
  background: var(--bg1);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  display: flex; flex-direction: column;
}
.sidebar-inner { padding: 1.2rem; flex: 1; }

.ctrl-section { margin-bottom: 1.4rem; }
.ctrl-title {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase;
  color: var(--green-b); margin-bottom: 0.65rem;
  display: flex; align-items: center; gap: 0.5rem;
}
.ctrl-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.fg label { display: block; font-size: 0.65rem; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 0.3rem; }
.fg + .fg { margin-top: 0.65rem; }
.fg input, .fg textarea, .fg select {
  width: 100%; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 6px; padding: 0.5rem 0.7rem; color: var(--text);
  font-size: 0.8rem; font-family: 'DM Sans', sans-serif; transition: border-color 0.15s;
}
.fg input:focus, .fg textarea:focus, .fg select:focus { outline: none; border-color: var(--green-b); }
.fg textarea { resize: vertical; min-height: 60px; line-height: 1.5; }

/* Platform toggle */
.platform-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
.plat-btn {
  padding: 0.5rem; border: 1px solid var(--border); border-radius: 7px;
  background: var(--bg3); color: var(--muted); font-size: 0.72rem;
  cursor: pointer; transition: all 0.15s; text-align: center; font-family: 'DM Sans', sans-serif;
}
.plat-btn.active { background: var(--bg2); border-color: var(--green-b); color: var(--green-l); font-weight: 700; }
.plat-btn:hover:not(.active) { border-color: var(--green); color: var(--green-l); }

/* Layout chips */
.layout-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.4rem; }
.layout-chip {
  padding: 0.5rem 0.3rem; border: 1px solid var(--border); border-radius: 7px;
  background: var(--bg3); color: var(--muted); font-size: 0.62rem;
  cursor: pointer; transition: all 0.15s; text-align: center; font-family: 'DM Mono', monospace;
  letter-spacing: 0.3px; line-height: 1.4;
}
.layout-chip.active { background: var(--bg2); border-color: var(--green-b); color: var(--green-l); font-weight: 500; }
.layout-chip:hover:not(.active) { border-color: var(--green); color: var(--green-l); }

/* Photo upload */
.photo-upload-area {
  border: 2px dashed var(--border); border-radius: 8px; padding: 1rem;
  text-align: center; cursor: pointer; transition: all 0.15s; background: var(--bg3);
}
.photo-upload-area:hover { border-color: var(--green-b); }
.photo-upload-area.has-photo { border-color: var(--green); background: var(--bg2); }
.photo-upload-text { font-size: 0.72rem; color: var(--muted); margin-top: 0.4rem; }
.photo-upload-text span { color: var(--green-b); cursor: pointer; }
.remove-photo { font-size: 0.65rem; color: #ef4444; cursor: pointer; margin-top: 0.4rem; display: none; }
.remove-photo.show { display: block; }

/* Export btn */
.export-btn {
  margin: 0 1.2rem 1.2rem;
  background: linear-gradient(135deg, var(--green), var(--green-b));
  border: none; border-radius: 8px; padding: 0.75rem;
  color: white; font-weight: 700; font-size: 0.85rem;
  cursor: pointer; letter-spacing: 1px; transition: all 0.2s;
  font-family: 'DM Sans', sans-serif; width: calc(100% - 2.4rem);
}
.export-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(82,183,136,0.3); }

/* ── CANVAS AREA ── */
.canvas-area {
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  padding: 2rem; overflow: auto;
}
.canvas-wrap {
  position: relative;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}
canvas { display: block; }

/* Size label */
.size-label {
  position: absolute; bottom: -24px; left: 50%; transform: translateX(-50%);
  font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--dim);
  white-space: nowrap;
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">CURBLOOM <span>/ POST DESIGNER</span></div>
  <a href="index.html" class="back-link">← PLAYBOOK</a>
</div>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-inner">

      <!-- CLIENT -->
      <div class="ctrl-section">
        <div class="ctrl-title">Client</div>
        <div class="fg">
          <select id="clientSelect" onchange="onClientChange()">
            <option value="0">Sara Hoffman — Webb City / SWMO</option>
            <option value="1">Emma — Lennar Sales Pro</option>
          </select>
        </div>
      </div>

      <!-- PLATFORM -->
      <div class="ctrl-section">
        <div class="ctrl-title">Platform</div>
        <div class="platform-row">
          <div class="plat-btn active" id="btn-ig" onclick="setPlatform('instagram')">📸 Instagram<br><span style="font-size:0.6rem;opacity:0.6">1080 × 1080</span></div>
          <div class="plat-btn" id="btn-fb" onclick="setPlatform('facebook')">📘 Facebook<br><span style="font-size:0.6rem;opacity:0.6">1200 × 630</span></div>
        </div>
      </div>

      <!-- LAYOUT -->
      <div class="ctrl-section">
        <div class="ctrl-title">Layout</div>
        <div class="layout-grid">
          <div class="layout-chip active" id="chip-bold-overlay" onclick="setLayout('bold-overlay')">Bold<br>Overlay</div>
          <div class="layout-chip" id="chip-data-drop" onclick="setLayout('data-drop')">Data<br>Drop</div>
          <div class="layout-chip" id="chip-split" onclick="setLayout('split')">Split<br>Half</div>
          <div class="layout-chip" id="chip-quote" onclick="setLayout('quote')">Big<br>Quote</div>
          <div class="layout-chip" id="chip-before-after" onclick="setLayout('before-after')">Before<br>After</div>
          <div class="layout-chip" id="chip-minimal" onclick="setLayout('minimal')">Clean<br>Minimal</div>
        </div>
      </div>

      <!-- CONTENT -->
      <div class="ctrl-section">
        <div class="ctrl-title">Content</div>
        <div class="fg">
          <label>Content Type</label>
          <select id="contentType" onchange="onContentTypeChange()">
            <option value="market">Market Update</option>
            <option value="educational">Educational</option>
            <option value="engagement">Engagement</option>
            <option value="social-proof">Social Proof</option>
            <option value="lead-gen">Lead Gen Hook</option>
            <option value="trust">Personality / Trust</option>
          </select>
        </div>
        <div class="fg">
          <label>Headline</label>
          <textarea id="txtHeadline" oninput="render()" rows="3">What's happening in Webb City right now</textarea>
        </div>
        <div class="fg">
          <label>Subtext / Stat</label>
          <input id="txtSub" oninput="render()" value="Your monthly market snapshot" />
        </div>
        <div class="fg">
          <label>Agent Name</label>
          <input id="txtAgent" oninput="render()" value="Sara Hoffman" />
        </div>
        <div class="fg">
          <label>Agent Title</label>
          <input id="txtTitle" oninput="render()" value="Realtor · Realty One Group Ovation" />
        </div>
      </div>

      <!-- PHOTO -->
      <div class="ctrl-section">
        <div class="ctrl-title">Photo</div>
        <div class="photo-upload-area" id="dropZone" onclick="document.getElementById('photoInput').click()">
          <div style="font-size:1.5rem;">📷</div>
          <div class="photo-upload-text">Click to upload<br><span>or drag & drop</span></div>
        </div>
        <div class="remove-photo" id="removePhoto" onclick="removePhoto()">✕ Remove photo</div>
        <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="loadPhoto(event)" />
      </div>

    </div>

    <button class="export-btn" onclick="exportPNG()">⬇ Export PNG</button>
  </div>

  <!-- CANVAS -->
  <div class="canvas-area">
    <div class="canvas-wrap">
      <canvas id="postCanvas"></canvas>
      <div class="size-label" id="sizeLabel">1080 × 1080px · Instagram</div>
    </div>
  </div>

</div>

<script>
// ── CLIENTS ──
const clients = [
  {
    name: "Sara Hoffman",
    title: "Realtor · Realty One Group Ovation",
    market: "Webb City · SWMO",
    primary: "#1a2744",
    secondary: "#ffffff",
    accent: "#c9a84c",
    accentDark: "#8a6820",
    bg: "#0d1628",
  },
  {
    name: "Emma",
    title: "New Home Sales Consultant · Lennar",
    market: "Your Market",
    primary: "#1a3a2a",
    secondary: "#ffffff",
    accent: "#52b788",
    accentDark: "#2d6a4f",
    bg: "#0a1a12",
  }
];

let state = {
  clientIdx: 0,
  platform: "instagram",
  layout: "bold-overlay",
  headline: "What's happening in Webb City right now",
  sub: "Your monthly market snapshot",
  agent: "Sara Hoffman",
  agentTitle: "Realtor · Realty One Group Ovation",
  photo: null,
};

const canvas = document.getElementById('postCanvas');
const ctx = canvas.getContext('2d');

function getSize() {
  return state.platform === 'instagram' ? { w: 1080, h: 1080 } : { w: 1200, h: 630 };
}

function getScale() {
  const size = getSize();
  const maxW = Math.min(window.innerWidth - 380, 600);
  const maxH = window.innerHeight - 120;
  return Math.min(maxW / size.w, maxH / size.h, 0.56);
}

function resizeCanvas() {
  const { w, h } = getSize();
  const scale = getScale();
  canvas.width = w;
  canvas.height = h;
  canvas.style.width = (w * scale) + 'px';
  canvas.style.height = (h * scale) + 'px';
  document.getElementById('sizeLabel').textContent = `${w} × ${h}px · ${state.platform === 'instagram' ? 'Instagram' : 'Facebook'}`;
}

// ── CONTENT TYPE DEFAULTS ──
const contentDefaults = {
  market: {
    headline: (c) => `What's happening in ${c.market} right now`,
    sub: 'Your monthly market snapshot',
    layout: 'data-drop',
  },
  educational: {
    headline: (c) => `3 things nobody tells you about buying in ${c.market}`,
    sub: 'The honest breakdown — save this',
    layout: 'minimal',
  },
  engagement: {
    headline: (c) => `Quick question for ${c.market} families`,
    sub: 'Drop your answer in the comments',
    layout: 'minimal',
  },
  'social-proof': {
    headline: (c) => `Another family just found their home in ${c.market}`,
    sub: 'Here\'s how it happened',
    layout: 'quote',
  },
  'lead-gen': {
    headline: (c) => `Thinking about buying in ${c.market}? Read this first.`,
    sub: 'DM me GUIDE — free, no pressure',
    layout: 'bold-overlay',
  },
  trust: {
    headline: (c) => `Behind the scenes`,
    sub: 'A week in the life',
    layout: 'bold-overlay',
  },
};

function onContentTypeChange() {
  const type = document.getElementById('contentType').value;
  const c = clients[state.clientIdx];
  const defaults = contentDefaults[type];
  if (!defaults) return;

  const headline = typeof defaults.headline === 'function' ? defaults.headline(c) : defaults.headline;
  document.getElementById('txtHeadline').value = headline;
  document.getElementById('txtSub').value = defaults.sub;
  state.headline = headline;
  state.sub = defaults.sub;

  // Suggest the best layout for this content type
  setLayout(defaults.layout);
  render();
}


function onClientChange() {
  state.clientIdx = parseInt(document.getElementById('clientSelect').value);
  const c = clients[state.clientIdx];
  document.getElementById('txtAgent').value = c.name;
  document.getElementById('txtTitle').value = c.title;
  state.agent = c.name;
  state.agentTitle = c.title;
  render();
}

function setPlatform(p) {
  state.platform = p;
  document.getElementById('btn-ig').className = 'plat-btn' + (p === 'instagram' ? ' active' : '');
  document.getElementById('btn-fb').className = 'plat-btn' + (p === 'facebook' ? ' active' : '');
  resizeCanvas();
  render();
}

function setLayout(l) {
  state.layout = l;
  document.querySelectorAll('.layout-chip').forEach(c => c.classList.remove('active'));
  document.getElementById('chip-' + l).classList.add('active');
  render();
}

function loadPhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  const img = new Image();
  img.onload = () => { state.photo = img; document.getElementById('dropZone').classList.add('has-photo'); document.getElementById('removePhoto').classList.add('show'); render(); };
  img.src = URL.createObjectURL(file);
}

function removePhoto() {
  state.photo = null;
  document.getElementById('dropZone').classList.remove('has-photo');
  document.getElementById('removePhoto').classList.remove('show');
  document.getElementById('photoInput').value = '';
  render();
}

// Drag drop
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = '#52b788'; });
dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = ''; });
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.style.borderColor = '';
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) { loadPhoto({ target: { files: [file] } }); }
});

document.getElementById('txtHeadline').addEventListener('input', e => { state.headline = e.target.value; render(); });
document.getElementById('txtSub').addEventListener('input', e => { state.sub = e.target.value; render(); });
document.getElementById('txtAgent').addEventListener('input', e => { state.agent = e.target.value; render(); });
document.getElementById('txtTitle').addEventListener('input', e => { state.agentTitle = e.target.value; render(); });

// ── DRAW HELPERS ──
function drawPhoto(x, y, w, h) {
  if (!state.photo) return;
  const img = state.photo;
  const scale = Math.max(w / img.width, h / img.height);
  const sw = img.width * scale, sh = img.height * scale;
  const sx = x + (w - sw) / 2, sy = y + (h - sh) / 2;
  ctx.drawImage(img, sx, sy, sw, sh);
}

function drawPhotoFit(x, y, w, h) {
  if (!state.photo) {
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    ctx.fillRect(x, y, w, h);
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.font = '500 28px DM Sans, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Photo goes here', x + w/2, y + h/2 + 10);
    return;
  }
  const img = state.photo;
  const scale = Math.max(w / img.width, h / img.height);
  const sw = img.width * scale, sh = img.height * scale;
  const sx = x + (w - sw) / 2, sy = y + (h - sh) / 2;
  ctx.drawImage(img, sx, sy, sw, sh);
}

function wrapText(text, x, y, maxW, lineH, maxLines) {
  const words = text.split(' ');
  let line = '', lines = [];
  for (let w of words) {
    const test = line + (line ? ' ' : '') + w;
    if (ctx.measureText(test).width > maxW && line) { lines.push(line); line = w; if (lines.length >= maxLines) break; }
    else line = test;
  }
  if (line && lines.length < maxLines) lines.push(line);
  lines.forEach((l, i) => ctx.fillText(l, x, y + i * lineH));
  return lines.length;
}

function drawBrandBar(c, W, H) {
  // Bottom brand strip
  ctx.fillStyle = c.accent;
  ctx.fillRect(0, H - 72, W, 72);
  ctx.fillStyle = c.primary;
  ctx.font = 'bold 26px DM Sans, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(state.agent, 32, H - 44);
  ctx.font = '400 20px DM Sans, sans-serif';
  ctx.fillStyle = c.accentDark;
  ctx.fillText(state.agentTitle, 32, H - 20);
  // Logo mark
  ctx.fillStyle = c.primary;
  ctx.font = 'bold 22px DM Mono, monospace';
  ctx.textAlign = 'right';
  ctx.fillText('CURBLOOM', W - 32, H - 36);
  ctx.font = '400 15px DM Mono, monospace';
  ctx.fillStyle = c.accentDark;
  ctx.fillText('exclusive territory', W - 32, H - 16);
}

function drawBrandBarDark(c, W, H) {
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, H - 72, W, 72);
  ctx.fillStyle = c.accent;
  ctx.font = 'bold 26px DM Sans, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(state.agent, 32, H - 44);
  ctx.font = '400 20px DM Sans, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fillText(state.agentTitle, 32, H - 20);
  ctx.fillStyle = c.accent;
  ctx.font = 'bold 22px DM Mono, monospace';
  ctx.textAlign = 'right';
  ctx.fillText('CURBLOOM', W - 32, H - 36);
  ctx.font = '400 15px DM Mono, monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fillText('exclusive territory', W - 32, H - 16);
}

// ── LAYOUTS ──

// 1. BOLD OVERLAY — full bleed photo, massive text on top
// Best for: Personality/Trust, Market Update with photo
function layoutBoldOverlay(c, W, H) {
  // Background
  if (state.photo) {
    ctx.save();
    ctx.rect(0, 0, W, H);
    ctx.clip();
    drawPhotoFit(0, 0, W, H);
    ctx.restore();
    // Dark gradient overlay bottom-heavy
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, 'rgba(0,0,0,0.25)');
    grad.addColorStop(0.45, 'rgba(0,0,0,0.55)');
    grad.addColorStop(1, 'rgba(0,0,0,0.88)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  } else {
    // Solid brand bg with texture
    ctx.fillStyle = c.primary;
    ctx.fillRect(0, 0, W, H);
    // Subtle diagonal stripe pattern
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    for (let i = -W; i < W * 2; i += 40) {
      ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i + H, H); ctx.stroke();
    }
    // Accent bar top
    ctx.fillStyle = c.accent;
    ctx.fillRect(0, 0, W, 12);
  }

  // Accent top bar always
  ctx.fillStyle = c.accent;
  ctx.fillRect(0, 0, W, 10);

  // ── HEADLINE BLOCK ──
  // Bebas Neue all-caps: em square is tall, need 1.2× line height minimum.
  // Strategy: measure → build lines array → calculate total block height →
  // anchor the BOTTOM of the block 36px above the brand bar. Never derive
  // firstLineY from subtraction of (n-1)*lh — that compounds errors.
  const fontSize  = W === 1080 ? 86 : 68;
  const lineH     = Math.round(fontSize * 1.22); // 1.22× = safe for all-caps display
  const PAD_L     = 48;
  const BRAND_H   = 72;
  const BOTTOM_PAD = BRAND_H + 40; // gap between last baseline and brand bar

  ctx.font = `900 ${fontSize}px Bebas Neue, sans-serif`;
  ctx.textAlign = 'left';

  // Build word-wrapped lines
  const maxW = W - PAD_L - 32;
  const rawWords = state.headline.toUpperCase().split(' ');
  const lines = [];
  let cur = '';
  for (const w of rawWords) {
    const candidate = cur ? cur + ' ' + w : w;
    if (ctx.measureText(candidate).width > maxW && cur) {
      lines.push(cur);
      cur = w;
    } else {
      cur = candidate;
    }
  }
  if (cur) lines.push(cur);

  // Anchor: baseline of LAST line sits at H - BOTTOM_PAD
  // baseline of line[i] = (H - BOTTOM_PAD) - (lines.length - 1 - i) * lineH
  const baselineLast = H - BOTTOM_PAD;

  ctx.fillStyle = '#ffffff';
  lines.forEach((l, i) => {
    const y = baselineLast - (lines.length - 1 - i) * lineH;
    ctx.fillText(l, PAD_L, y);
  });

  // Accent rule — 16px above the FIRST line's baseline
  const baselineFirst = baselineLast - (lines.length - 1) * lineH;
  ctx.fillStyle = c.accent;
  ctx.fillRect(PAD_L, baselineFirst - fontSize - 20, 64, 5);

  // Sub — 14px above accent rule
  const subY = baselineFirst - fontSize - 38;
  ctx.font = `500 ${W === 1080 ? 28 : 22}px DM Sans, sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.textAlign = 'left';
  ctx.fillText(state.sub, PAD_L, subY);

  drawBrandBarDark(c, W, H);
}

// 2. DATA DROP — big number/stat front and center
// Best for: Market Update with stats
function layoutDataDrop(c, W, H) {
  // Bg
  ctx.fillStyle = c.bg || c.primary;
  ctx.fillRect(0, 0, W, H);

  // Accent corner graphic
  ctx.fillStyle = c.accent;
  ctx.fillRect(0, 0, W, 8);
  ctx.fillRect(0, 0, 8, H);

  // Background photo (dim)
  if (state.photo) {
    ctx.save();
    ctx.globalAlpha = 0.12;
    ctx.rect(0, 0, W, H);
    ctx.clip();
    drawPhotoFit(0, 0, W, H);
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  // Top label
  ctx.font = `500 ${W === 1080 ? 26 : 22}px DM Mono, sans-serif`;
  ctx.fillStyle = c.accent;
  ctx.textAlign = 'left';
  ctx.letterSpacing = '3px';
  ctx.fillText('MARKET UPDATE', 60, 80);
  ctx.letterSpacing = '0px';

  // MASSIVE central stat / headline
  // Split headline at a natural break for two-line treatment
  const headline = state.headline.toUpperCase();
  const mid = Math.ceil(headline.split(' ').length / 2);
  const words = headline.split(' ');
  const line1 = words.slice(0, mid).join(' ');
  const line2 = words.slice(mid).join(' ');

  const bigFont = W === 1080 ? 110 : 84;
  ctx.font = `900 ${bigFont}px Bebas Neue, sans-serif`;
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';

  // Scale down if too wide
  let fs = bigFont;
  while (ctx.measureText(line1).width > W - 120 && fs > 60) { fs -= 4; ctx.font = `900 ${fs}px Bebas Neue, sans-serif`; }

  const centerY = H * 0.42;
  ctx.fillText(line1, W / 2, centerY - fs * 0.1);
  // Line 2 slightly smaller accent color
  ctx.fillStyle = c.accent;
  ctx.fillText(line2, W / 2, centerY + fs * 1.05);

  // Horizontal rule
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(60, H * 0.62);
  ctx.lineTo(W - 60, H * 0.62);
  ctx.stroke();

  // Sub text
  ctx.font = `400 ${W === 1080 ? 30 : 24}px DM Sans, sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.textAlign = 'center';
  const subLines = state.sub.split('\n');
  subLines.forEach((l, i) => ctx.fillText(l, W / 2, H * 0.68 + i * 40));

  // CTA nudge
  ctx.font = `700 ${W === 1080 ? 24 : 20}px DM Sans, sans-serif`;
  ctx.fillStyle = c.accent;
  ctx.textAlign = 'center';
  ctx.fillText('↓  FULL BREAKDOWN IN CAPTION', W / 2, H - 110);

  drawBrandBar(c, W, H);
}

// 3. SPLIT HALF — photo left, text right (or top/bottom for square)
function layoutSplit(c, W, H) {
  if (W === H) {
    // ── SQUARE: photo top 52%, text bottom 48% ──
    const photoH = Math.floor(H * 0.52);

    // Photo
    ctx.save();
    ctx.beginPath(); ctx.rect(0, 0, W, photoH); ctx.clip();
    if (state.photo) { drawPhotoFit(0, 0, W, photoH); }
    else {
      ctx.fillStyle = c.primary;
      ctx.fillRect(0, 0, W, photoH);
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.font = '400 26px DM Sans, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Add a photo above', W / 2, photoH / 2 + 10);
    }
    ctx.restore();

    // Blend + accent stripe
    const blend = ctx.createLinearGradient(0, photoH - 60, 0, photoH + 30);
    blend.addColorStop(0, 'rgba(0,0,0,0)');
    blend.addColorStop(1, c.primary);
    ctx.fillStyle = blend;
    ctx.fillRect(0, photoH - 60, W, 90);
    ctx.fillStyle = c.accent;
    ctx.fillRect(0, photoH - 4, W, 8);

    // Text panel
    ctx.fillStyle = c.primary;
    ctx.fillRect(0, photoH + 4, W, H - photoH);

    const PAD = 40;
    const textW = W - PAD * 2;
    const hSz = 58;
    const hLH = Math.round(hSz * 1.22);

    ctx.font = `900 ${hSz}px Bebas Neue, sans-serif`;
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'left';
    const hlWords = state.headline.toUpperCase().split(' ');
    const hlLines = [];
    let hlCur = '';
    for (const w of hlWords) {
      const candidate = hlCur ? hlCur + ' ' + w : w;
      if (ctx.measureText(candidate).width > textW && hlCur) { hlLines.push(hlCur); hlCur = w; }
      else hlCur = candidate;
    }
    if (hlCur) hlLines.push(hlCur);

    const textStartY = photoH + PAD;
    hlLines.slice(0, 3).forEach((l, i) => ctx.fillText(l, PAD, textStartY + hSz + i * hLH));

    const subY = textStartY + hSz + Math.min(hlLines.length, 3) * hLH + 14;
    ctx.font = '400 24px DM Sans, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fillText(state.sub, PAD, subY);

    // Agent byline at very bottom
    ctx.font = 'bold 22px DM Sans, sans-serif';
    ctx.fillStyle = c.accent;
    ctx.fillText(state.agent, PAD, H - 38);
    ctx.font = '400 18px DM Sans, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.38)';
    ctx.fillText(state.agentTitle, PAD, H - 16);
    ctx.font = 'bold 18px DM Mono, monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.textAlign = 'right';
    ctx.fillText('CURBLOOM', W - PAD, H - 22);

  } else {
    // ── WIDE (Facebook 1200×630): photo left 46%, text right 54% ──
    // Key: 630px tall is much shorter. All Y values must be proportional to H.
    const photoW  = Math.floor(W * 0.46);
    const textX   = photoW + 8;  // 8px for divider
    const textW   = W - textX - 48;
    const PAD_V   = Math.round(H * 0.1);  // 10% top/bottom padding = 63px

    // Background
    ctx.fillStyle = c.primary;
    ctx.fillRect(0, 0, W, H);

    // Photo left
    ctx.save();
    ctx.beginPath(); ctx.rect(0, 0, photoW, H); ctx.clip();
    if (state.photo) { drawPhotoFit(0, 0, photoW, H); }
    else {
      ctx.fillStyle = c.bg || '#0d1628';
      ctx.fillRect(0, 0, photoW, H);
      ctx.fillStyle = 'rgba(255,255,255,0.1)';
      ctx.font = '400 20px DM Sans, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Photo', photoW / 2, H / 2 + 8);
    }
    ctx.restore();

    // Accent divider
    ctx.fillStyle = c.accent;
    ctx.fillRect(photoW, 0, 8, H);

    // ── Right text column — 4-row layout: eyebrow / headline / sub / agent ──
    // Divide available height into zones rather than using hardcoded pixels
    const availH     = H - PAD_V * 2;
    const eyebrowSz  = 16;
    const hSz        = Math.min(56, Math.floor(availH * 0.12));  // ~12% of available
    const hLH        = Math.round(hSz * 1.2);
    const subSz      = 20;
    const agentSz    = 20;

    // Eyebrow
    ctx.font      = `500 ${eyebrowSz}px DM Mono, monospace`;
    ctx.fillStyle = c.accent;
    ctx.textAlign = 'left';
    ctx.fillText('CURBLOOM', textX, PAD_V + eyebrowSz);

    // Accent rule
    ctx.fillStyle = c.accent;
    ctx.fillRect(textX, PAD_V + eyebrowSz + 8, 48, 3);

    // Headline — starts after eyebrow + rule + gap
    const headStartBaseline = PAD_V + eyebrowSz + 8 + 3 + 20 + hSz;
    ctx.font      = `900 ${hSz}px Bebas Neue, sans-serif`;
    ctx.fillStyle = '#ffffff';
    const hlWords = state.headline.toUpperCase().split(' ');
    const hlLines = [];
    let hlCur = '';
    for (const w of hlWords) {
      const candidate = hlCur ? hlCur + ' ' + w : w;
      if (ctx.measureText(candidate).width > textW && hlCur) { hlLines.push(hlCur); hlCur = w; }
      else hlCur = candidate;
    }
    if (hlCur) hlLines.push(hlCur);

    // Cap lines so we don't overflow — on 630px tall canvas, max 3 lines
    const maxLines = 3;
    hlLines.slice(0, maxLines).forEach((l, i) => {
      ctx.fillText(l, textX, headStartBaseline + i * hLH);
    });

    // Sub — 20px gap after last headline line
    const lastHY = headStartBaseline + (Math.min(hlLines.length, maxLines) - 1) * hLH;
    const subY   = lastHY + 22;
    ctx.font      = `400 ${subSz}px DM Sans, sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fillText(state.sub, textX, subY);

    // Agent — anchored to bottom of panel
    const agentY = H - PAD_V;
    ctx.font      = `bold ${agentSz}px DM Sans, sans-serif`;
    ctx.fillStyle = c.accent;
    ctx.fillText(state.agent, textX, agentY - agentSz - 4);
    ctx.font      = `400 ${Math.round(agentSz * 0.82)}px DM Sans, sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillText(state.agentTitle, textX, agentY);
  }
}

// 4. BIG QUOTE — social proof / testimonial
function layoutQuote(c, W, H) {
  ctx.fillStyle = c.bg || c.primary;
  ctx.fillRect(0, 0, W, H);

  if (state.photo) {
    ctx.save();
    ctx.globalAlpha = 0.1;
    ctx.beginPath(); ctx.rect(0, 0, W, H); ctx.clip();
    drawPhotoFit(0, 0, W, H);
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  // Accent bars
  ctx.fillStyle = c.accent;
  ctx.fillRect(0, 0, W, 10);
  ctx.fillRect(0, H - 10, W, 10);

  const BRAND_H  = 72;
  const CONTENT_H = H - BRAND_H;

  // ── Text sizing — proportional to canvas height so FB & IG both work ──
  const qFont  = Math.round(CONTENT_H * (W === 1080 ? 0.048 : 0.056));
  const qLineH = Math.round(qFont * 1.52);
  const subSz  = Math.round(qFont * 0.48);
  const PAD_H  = Math.round(W * 0.092);

  // ── Wrap text ──
  ctx.font = `700 italic ${qFont}px Playfair Display, serif`;
  const maxTW = W - PAD_H * 2;
  const words = state.headline.split(' ');
  const lines = [];
  let cur = '';
  for (const w of words) {
    const candidate = cur ? cur + ' ' + w : w;
    if (ctx.measureText(candidate).width > maxTW && cur) { lines.push(cur); cur = w; }
    else cur = candidate;
  }
  if (cur) lines.push(cur);

  // ── Mark geometry — editorial corner brackets ──
  // Opening = top-left corner bracket  ⌜
  // Closing = bottom-right corner bracket  ⌟
  // Placed at fixed inset from canvas edges so they span the full width — wide apart
  const MK  = Math.round(W * 0.052);   // arm length — ~56px on 1080, ~62px on 1200
  const MW  = Math.round(MK * 0.15);   // stroke width
  const INS = Math.round(W * 0.044);   // inset from canvas left/right edge

  // ── Measure total content block ──
  // content = text lines + sub; marks are decorative and sit outside this zone
  const textBlockH = qFont + (lines.length - 1) * qLineH;
  const subGap     = Math.round(qFont * 0.72);
  const totalH     = textBlockH + subGap + subSz;

  // Center text+sub block within CONTENT_H
  const blockTop  = Math.round((CONTENT_H - totalH) / 2);
  const firstBase = blockTop + qFont;

  // Mark Y positions: opening aligns with top of text block, closing with bottom
  const openMarkY  = blockTop - Math.round(MW * 1.5);          // top of opening bracket
  const closeMarkY = blockTop + textBlockH + Math.round(MW * 1.5); // bottom of closing bracket

  // ── Draw opening bracket (top-left) ──
  // Horizontal arm pointing right, vertical arm pointing down
  ctx.fillStyle = c.accent;
  ctx.fillRect(INS,        openMarkY,        MK, MW);  // horizontal
  ctx.fillRect(INS,        openMarkY,        MW, MK);  // vertical

  // ── Draw closing bracket (bottom-right) ──
  // Horizontal arm pointing left, vertical arm pointing up
  ctx.fillRect(W - INS - MK, closeMarkY - MW, MK, MW);  // horizontal
  ctx.fillRect(W - INS - MW, closeMarkY - MK, MW, MK);  // vertical

  // ── Draw text lines, centered horizontally ──
  ctx.font      = `700 italic ${qFont}px Playfair Display, serif`;
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  lines.forEach((l, i) => {
    ctx.fillText(l, W / 2, firstBase + i * qLineH);
  });

  // ── Attribution ──
  const subY = firstBase + (lines.length - 1) * qLineH + subGap;
  ctx.font      = `400 ${subSz}px DM Sans, sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.textAlign = 'center';
  ctx.fillText('— ' + state.sub, W / 2, subY);

  drawBrandBar(c, W, H);
}

// 5. BEFORE / AFTER — split reveal
// Best for: Transformation, educational content
function layoutBeforeAfter(c, W, H) {
  const half = Math.floor(W / 2);
  const brandH = 72;
  const contentH = H - brandH;

  // LEFT SIDE — "Before"
  ctx.save();
  ctx.beginPath(); ctx.rect(0, 0, half, contentH); ctx.clip();
  if (state.photo) {
    drawPhotoFit(0, 0, half, contentH);
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, half, contentH);
  } else {
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, half, contentH);
  }
  ctx.restore();

  // "BEFORE" label left
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = `700 ${W === 1080 ? 22 : 18}px DM Mono, monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('BEFORE', half / 2, 50);

  // Left big text — problem/pain
  ctx.font = `900 ${W === 1080 ? 64 : 52}px Bebas Neue, sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.textAlign = 'center';
  const leftWords = (state.headline.split('→')[0] || state.headline).trim().toUpperCase().split(' ');
  let ll = [], lline = '';
  for (let w of leftWords) { const t = lline + (lline ? ' ' : '') + w; if (ctx.measureText(t).width > half - 60 && lline) { ll.push(lline); lline = w; } else lline = t; }
  if (lline) ll.push(lline);
  const lfs = W === 1080 ? 68 : 56;
  ll.slice(0, 4).forEach((l, i) => ctx.fillText(l, half / 2, contentH * 0.35 + i * (lfs + 8)));

  // RIGHT SIDE — "After"
  ctx.save();
  ctx.beginPath(); ctx.rect(half, 0, half, contentH); ctx.clip();
  ctx.fillStyle = c.primary;
  ctx.fillRect(half, 0, half, contentH);
  if (state.photo) {
    ctx.globalAlpha = 0.15;
    drawPhotoFit(half, 0, half, contentH);
    ctx.globalAlpha = 1;
  }
  ctx.restore();

  // "AFTER" label right
  ctx.fillStyle = c.accent;
  ctx.font = `700 ${W === 1080 ? 22 : 18}px DM Mono, monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('AFTER', half + half / 2, 50);

  // Right big text — solution
  ctx.font = `900 ${W === 1080 ? 64 : 52}px Bebas Neue, sans-serif`;
  ctx.fillStyle = '#ffffff';
  const rightWords = (state.headline.split('→')[1] || state.sub).trim().toUpperCase().split(' ');
  let rl = [], rline = '';
  for (let w of rightWords) { const t = rline + (rline ? ' ' : '') + w; if (ctx.measureText(t).width > half - 60 && rline) { rl.push(rline); rline = w; } else rline = t; }
  if (rline) rl.push(rline);
  rl.slice(0, 4).forEach((l, i) => ctx.fillText(l, half + half / 2, contentH * 0.35 + i * (lfs + 8)));

  // CENTER DIVIDER
  ctx.fillStyle = c.accent;
  ctx.fillRect(half - 4, 0, 8, contentH);

  // Arrow at center
  const arrowY = contentH * 0.5;
  ctx.fillStyle = c.accent;
  ctx.beginPath();
  ctx.arc(half, arrowY, W === 1080 ? 38 : 30, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = c.primary;
  ctx.font = `bold ${W === 1080 ? 32 : 26}px DM Sans, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('→', half, arrowY + 11);

  // Tip bottom center
  ctx.font = `400 ${W === 1080 ? 26 : 21}px DM Sans, sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.textAlign = 'center';
  ctx.fillText(state.sub, W / 2, contentH - 30);

  drawBrandBar(c, W, H);
}

// 6. CLEAN MINIMAL — typography-first, light background
function layoutMinimal(c, W, H) {
  // ── Spacing system (per Nike/Apple design principles) ──
  // Base unit = 16px (1080) or 12px (Facebook)
  // Related elements: 1× unit apart
  // Sections: 2–3× apart
  // Completely separate: 4×+
  const U      = W === 1080 ? 16 : 12;
  const PAD_L  = U * 4;          // 64px left margin
  const PAD_T  = U * 4;          // 64px top margin  
  const textW  = W - PAD_L - U * 4;

  // Background
  ctx.fillStyle = '#f5f4f0';
  ctx.fillRect(0, 0, W, H);

  // Top bar — primary color, thick
  ctx.fillStyle = c.primary;
  ctx.fillRect(0, 0, W, U * 0.75);

  // Left accent bar
  ctx.fillStyle = c.accent;
  ctx.fillRect(0, 0, U * 0.625, H);

  // ── EYEBROW ──
  const eyebrowSz = W === 1080 ? 20 : 16;
  ctx.font        = `500 ${eyebrowSz}px DM Mono, monospace`;
  ctx.fillStyle   = c.accent;
  ctx.textAlign   = 'left';
  const eyebrowY  = PAD_T + eyebrowSz;
  ctx.fillText(state.agent.toUpperCase(), PAD_L, eyebrowY);

  // Hairline rule — 1× below eyebrow
  const ruleY = eyebrowY + U;
  ctx.strokeStyle = 'rgba(0,0,0,0.1)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(PAD_L, ruleY); ctx.lineTo(W - U * 4, ruleY); ctx.stroke();

  // ── HEADLINE ──
  // 3× size ratio vs sub (Pangram Pangram rule: headline 2–3× larger)
  const hSz    = W === 1080 ? 80 : 62;
  const hLineH = Math.round(hSz * 1.18); // 1.18× for all-caps display
  ctx.font     = `900 ${hSz}px Bebas Neue, sans-serif`;
  ctx.fillStyle = c.primary;

  const words = state.headline.toUpperCase().split(' ');
  const lines = [];
  let cur = '';
  for (const w of words) {
    const candidate = cur ? cur + ' ' + w : w;
    if (ctx.measureText(candidate).width > textW && cur) { lines.push(cur); cur = w; }
    else cur = candidate;
  }
  if (cur) lines.push(cur);

  // 3× unit gap between rule and first headline baseline
  const headY = ruleY + U * 3 + hSz;
  lines.slice(0, 4).forEach((l, i) => {
    ctx.fillText(l, PAD_L, headY + i * hLineH);
  });

  // Accent underline — 1× below last headline line, width = 40% of canvas
  const lastHeadlineY = headY + (Math.min(lines.length, 4) - 1) * hLineH;
  const underlineW    = Math.round(W * 0.38);
  ctx.fillStyle = c.accent;
  ctx.fillRect(PAD_L, lastHeadlineY + U, underlineW, U * 0.4);

  // ── SUBTEXT ──
  // 3× unit gap below underline (section break)
  const subSz    = W === 1080 ? 28 : 22;
  const subLineH = Math.round(subSz * 1.5); // body text needs 1.5× (Figma guideline)
  ctx.font       = `400 ${subSz}px DM Sans, sans-serif`;
  ctx.fillStyle  = 'rgba(0,0,0,0.48)';
  const subY     = lastHeadlineY + U + U * 0.4 + U * 3 + subSz;
  wrapText(state.sub, PAD_L, subY, textW, subLineH, 3);

  // ── CTA PILL ──
  // Anchored 16px above brand bar — completely separate element
  const BRAND_H  = 72;
  const ctaH     = W === 1080 ? 56 : 44;
  const ctaW     = W === 1080 ? 272 : 212;
  const ctaY     = H - BRAND_H - U - ctaH;
  const ctaLabel = '→  DM FOR DETAILS';

  ctx.fillStyle = c.primary;
  ctx.beginPath();
  ctx.roundRect(PAD_L, ctaY, ctaW, ctaH, ctaH / 2);
  ctx.fill();

  ctx.fillStyle = '#ffffff';
  ctx.font      = `700 ${W === 1080 ? 19 : 15}px DM Mono, monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(ctaLabel, PAD_L + ctaW / 2, ctaY + ctaH * 0.64);

  // ── BRAND BAR ──
  ctx.fillStyle = c.primary;
  ctx.fillRect(0, H - BRAND_H, W, BRAND_H);

  ctx.fillStyle = c.accent;
  ctx.font      = `bold ${W === 1080 ? 24 : 20}px DM Sans, sans-serif`;
  ctx.textAlign = 'left';
  ctx.fillText(state.agent, 32, H - BRAND_H + U * 2.75);

  ctx.fillStyle = 'rgba(255,255,255,0.48)';
  ctx.font      = `400 ${W === 1080 ? 18 : 15}px DM Sans, sans-serif`;
  ctx.fillText(state.agentTitle, 32, H - BRAND_H + U * 2.75 + U * 1.5);

  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.font      = `bold ${W === 1080 ? 18 : 15}px DM Mono, monospace`;
  ctx.textAlign = 'right';
  ctx.fillText('CURBLOOM', W - 32, H - BRAND_H + U * 2.75);
  ctx.font      = `400 ${W === 1080 ? 13 : 11}px DM Mono, monospace`;
  ctx.fillText('exclusive territory', W - 32, H - BRAND_H + U * 2.75 + U * 1.5);
}

// ── MAIN RENDER ──
function render() {
  const { w, h } = getSize();
  const c = clients[state.clientIdx];

  ctx.clearRect(0, 0, w, h);

  switch (state.layout) {
    case 'bold-overlay':   layoutBoldOverlay(c, w, h); break;
    case 'data-drop':      layoutDataDrop(c, w, h); break;
    case 'split':          layoutSplit(c, w, h); break;
    case 'quote':          layoutQuote(c, w, h); break;
    case 'before-after':   layoutBeforeAfter(c, w, h); break;
    case 'minimal':        layoutMinimal(c, w, h); break;
  }
}

// ── EXPORT ──
function exportPNG() {
  const { w, h } = getSize();
  // Render at full resolution
  const tmpCanvas = document.createElement('canvas');
  tmpCanvas.width = w; tmpCanvas.height = h;
  const tmpCtx = tmpCanvas.getContext('2d');

  // Re-draw onto full-size canvas
  const oldCtx = ctx;
  Object.assign(tmpCtx, { font: ctx.font });

  // Use original canvas (already full size)
  const link = document.createElement('a');
  link.download = `curbloom-${state.agent.replace(/\s/g,'-').toLowerCase()}-${state.layout}-${state.platform}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// ── INIT ──
resizeCanvas();
render();
window.addEventListener('resize', () => { resizeCanvas(); render(); });
</script>
